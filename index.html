<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORE-RING ENGINE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CORERING">
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        #install-btn {
            background: none; border: none;
            cursor: pointer; color: currentColor;
            padding: 0; display: flex; align-items: center; padding: 0 20px ;
        }
        #install-btn.pwa-ready svg { stroke: #f0b429; }
    </style>
</head>
<body>
    <header id="header">
        <div class="header-top">
            <div class="logo-area"><a href="/" style="text-decoration:none;"> 
                <span class="logo-core">CORE</span><span class="logo-ring">RING</span></a>
            </div>
            <div style="display:flex; align-items:center; gap:14px;">

                <!-- 모드 토글 -->
                <button id="mode-toggle" onclick="toggleMode()" style="
                    background: none;
                    border: 1px solid rgba(255,255,255,0.12);
                    cursor: pointer;
                    color: currentColor;
                    padding: 4px 14px;
                    border-radius: 20px;
                    font-size: 10px;
                    letter-spacing: 2px;
                    font-family: monospace;
                    transition: all 0.3s;
                ">
                    <span id="mode-label">RING</span>
                </button>
            
                <!-- 대화 삭제 버튼 (다시 추가) -->
                <button id="clear-btn" aria-label="대화 삭제" style="
                    background: none; border: none;
                    cursor: pointer; color: #555;
                    padding: 0; display: flex; align-items: center;
                    transition: color 0.2s;
                ">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                        <path d="M10 11v6M14 11v6"></path>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                    </svg>
                </button>
            
                <!-- 홈 화면 추가 버튼 -->
                <button id="install-btn" aria-label="홈 화면에 추가">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2v13M7 10l5 5 5-5"/>
                        <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
                    </svg>
                </button>
            
                <!-- 공유 버튼 -->
                <button id="share-btn" style="
                    background:none; border:none; cursor:pointer;
                    color:currentColor; padding:0; display:flex; align-items:center;
                " aria-label="공유">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            
            </div>
        </div>
        <div class="morse-r" id="morse-logo">
            <div class="m-dot"></div><div class="m-dash"></div><div class="m-dot"></div>
        </div>
    </header>

    <main id="chat-history"></main>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button id="modal-close">확인</button>
        </div>
    </div>

    <footer>
        <input type="text" id="userInput" class="input-box" placeholder="심장을 분석합니다..." autocomplete="off">
        <button id="send-btn" class="btn-send">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </button>
    </footer>

    <!-- 모듈 로드 순서 고정 (의존성 순서) -->
    <script src="dialect.js"></script>
    <script src="conflict.js"></script>
    <script src="logger.js"></script>
    <script src="mindworld.js"></script>
    <script src="engine.js"></script>
    <script src="pipeline.js"></script>
    <script src="share.js"></script>
    <script src="install.js"></script>
    <script src="locale-setup.js"></script>
</body>
</html>
